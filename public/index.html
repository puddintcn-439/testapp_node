<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UserHub — Manage Your Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f0f4ff;
        --card: #ffffff;
        --accent: #4f46e5;
        --accent-hover: #4338ca;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --radius: 12px;
        --shadow: 0 4px 24px rgba(79,70,229,.08);
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── NAV ── */
      nav {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
        box-shadow: 0 1px 4px rgba(0,0,0,.05);
      }
      .logo {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -.3px;
        display:flex; align-items:center; gap:8px;
      }
      .logo span { font-weight: 400; color: var(--muted); font-size:.85rem; }
      .nav-badge {
        background: #ede9fe;
        color: var(--accent);
        font-size: .72rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 99px;
      }

      /* ── HERO ── */
      .hero {
        text-align: center;
        padding: 64px 24px 48px;
      }
      .hero-pill {
        display: inline-block;
        background: #ede9fe;
        color: var(--accent);
        font-size: .78rem;
        font-weight: 600;
        padding: 5px 14px;
        border-radius: 99px;
        margin-bottom: 20px;
        letter-spacing: .3px;
      }
      .hero h1 {
        font-size: clamp(2rem,5vw,3rem);
        font-weight: 700;
        letter-spacing: -.5px;
        line-height: 1.15;
        margin-bottom: 14px;
      }
      .hero h1 em {
        font-style: normal;
        background: linear-gradient(90deg,#4f46e5,#7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero p {
        color: var(--muted);
        font-size: 1.05rem;
        max-width: 480px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* ── STATS ── */
      .stats {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        padding: 0 24px 48px;
      }
      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 32px;
        text-align: center;
        min-width: 140px;
        box-shadow: var(--shadow);
      }
      .stat-card .num {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-card .label {
        font-size: .8rem;
        color: var(--muted);
        margin-top: 4px;
      }

      /* ── MAIN CARD ── */
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px 80px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .card-header h2 { font-size: 1rem; font-weight: 600; }

      /* ── FORM ── */
      #userForm {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: #fafafa;
      }
      #userForm input {
        flex: 1;
        min-width: 160px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: .9rem;
        font-family: inherit;
        outline: none;
        transition: border .15s, box-shadow .15s;
        background: #fff;
      }
      #userForm input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      }
      .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        font-size: .88rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, transform .1s;
        white-space: nowrap;
      }
      .btn:active { transform: scale(.97); }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost { background: #f3f4f6; color: var(--text); }
      .btn-ghost:hover { background: #e5e7eb; }
      .btn-danger { background: #fff0f0; color: var(--danger); border: 1px solid #fecaca; }
      .btn-danger:hover { background: var(--danger); color: #fff; }
      .btn-edit { background: #eef2ff; color: var(--accent); border: 1px solid #c7d2fe; }
      .btn-edit:hover { background: var(--accent); color: #fff; }
      .btn-sm { padding: 6px 12px; font-size: .8rem; }

      /* ── TABLE ── */
      .table-wrap { overflow-x: auto; }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: .9rem;
      }
      thead { background: #f8f9ff; }
      th {
        padding: 12px 16px;
        text-align: left;
        font-size: .78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .5px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      tbody tr:hover { background: #f8f9ff; }
      tbody tr:last-child td { border-bottom: none; }
      .id-badge {
        display: inline-block;
        background: #f3f4f6;
        color: var(--muted);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: .8rem;
        font-weight: 600;
      }
      .avatar {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px; height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg,#818cf8,#4f46e5);
        color: #fff;
        font-weight: 700;
        font-size: .8rem;
        margin-right: 10px;
        vertical-align: middle;
        flex-shrink: 0;
      }
      .name-cell { display: flex; align-items: center; }
      .empty {
        text-align: center;
        padding: 48px;
        color: var(--muted);
        font-size: .95rem;
      }
      .empty svg { display:block; margin:0 auto 12px; opacity:.35; }

      /* ── TOAST ── */
      #toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: #111827;
        color: #fff;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: .88rem;
        font-weight: 500;
        box-shadow: 0 8px 24px rgba(0,0,0,.2);
        opacity: 0;
        transform: translateY(8px);
        transition: all .25s;
        pointer-events: none;
        z-index: 100;
      }
      #toast.show { opacity: 1; transform: translateY(0); }

      /* ── FOOTER ── */
      footer {
        text-align: center;
        padding: 24px;
        color: var(--muted);
        font-size: .8rem;
      }

      @media (max-width: 600px) {
        #userForm { gap: 8px; }
        #userForm input { min-width: 100%; }
        .hero { padding: 40px 16px 32px; }
        nav { padding: 0 16px; }
      }
    </style>
  </head>
  <body>

    <nav>
      <div class="logo">
        &#9881; UserHub
        <span>/ dashboard</span>
      </div>
      <span class="nav-badge">v1.0</span>
    </nav>

    <section class="hero">
      <div class="hero-pill">&#10024; User Management</div>
      <h1>Manage your users<br /><em>fast &amp; beautifully</em></h1>
      <p>Add, edit, and remove users in seconds. Clean interface, instant feedback.</p>
    </section>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">—</div>
        <div class="label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statLast">—</div>
        <div class="label">Latest ID</div>
      </div>
    </div>

    <main>
      <div class="card">
        <div class="card-header">
          <h2>&#128101; User List</h2>
        </div>

        <form id="userForm">
          <input type="hidden" id="userId" />
          <input id="name" placeholder="Full name" required autocomplete="off" />
          <input id="email" placeholder="Email address" type="email" required autocomplete="off" />
          <button class="btn btn-primary" type="submit" id="submitBtn">Add User</button>
          <button class="btn btn-ghost" type="button" id="cancelBtn" style="display:none">Cancel</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer>Built with Express &amp; &#10084;&#65039;</footer>
    <div id="toast"></div>

    <script>
      const usersTbody = document.getElementById('users');
      const form = document.getElementById('userForm');
      const userIdInput = document.getElementById('userId');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const cancelBtn = document.getElementById('cancelBtn');
      const submitBtn = document.getElementById('submitBtn');
      const toastEl = document.getElementById('toast');

      function toast(msg, duration = 2600) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toastEl.classList.remove('show'), duration);
      }

      function initials(name) {
        return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
      }

      async function fetchUsers() {
        try {
          const res = await fetch('/api/users');
          const users = await res.json();

          // update stats
          document.getElementById('statTotal').textContent = users.length;
          document.getElementById('statLast').textContent = users.length ? Math.max(...users.map(u => u.id)) : '—';

          if (users.length === 0) {
            usersTbody.innerHTML = `<tr><td colspan="4"><div class="empty">
              <svg width="40" height="40" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="#9ca3af" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
              No users yet. Add one above!
            </div></td></tr>`;
            return;
          }

          usersTbody.innerHTML = users.map(u => `
            <tr>
              <td><span class="id-badge">#${u.id}</span></td>
              <td><div class="name-cell"><span class="avatar">${initials(u.name)}</span>${escHtml(u.name)}</div></td>
              <td>${escHtml(u.email)}</td>
              <td style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-edit btn-sm" data-id="${u.id}" data-action="edit">Edit</button>
                <button class="btn btn-danger btn-sm" data-id="${u.id}" data-action="del">Delete</button>
              </td>
            </tr>
          `).join('');
        } catch (e) {
          toast('Failed to load users');
        }
      }

      function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = userIdInput.value;
        const payload = { name: nameInput.value.trim(), email: emailInput.value.trim() };
        try {
          if (id) {
            await fetch('/api/users/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            toast('✅ User updated');
          } else {
            await fetch('/api/users', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            toast('✅ User added');
          }
          resetForm();
          fetchUsers();
        } catch {
          toast('❌ Failed to save user');
        }
      });

      cancelBtn.addEventListener('click', () => resetForm());

      usersTbody.addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;

        if (btn.dataset.action === 'edit') {
          try {
            const res = await fetch('/api/users/' + id);
            const u = await res.json();
            userIdInput.value = u.id;
            nameInput.value = u.name;
            emailInput.value = u.email;
            submitBtn.textContent = 'Update';
            cancelBtn.style.display = '';
            nameInput.focus();
          } catch {
            toast('❌ Failed to load user');
          }
        }

        if (btn.dataset.action === 'del') {
          if (!confirm('Delete user #' + id + '?')) return;
          try {
            await fetch('/api/users/' + id, { method: 'DELETE' });
            toast('🗑️ User deleted');
            fetchUsers();
          } catch {
            toast('❌ Failed to delete user');
          }
        }
      });

      function resetForm() {
        userIdInput.value = '';
        nameInput.value = '';
        emailInput.value = '';
        submitBtn.textContent = 'Add User';
        cancelBtn.style.display = 'none';
      }

      fetchUsers();
    </script>
  </body>
</html>
