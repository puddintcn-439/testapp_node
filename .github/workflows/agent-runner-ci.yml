name: Agent Runner CI

on:
  push:
    paths:
      - 'agent-runner/**'
  pull_request:
    paths:
      - 'agent-runner/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          cd agent-runner
          npm ci
      - name: Run tests
        run: |
          cd agent-runner
          npm ci
          npm run test:ci
      - name: Build
        run: |
          cd agent-runner
          npm run build
