name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Trigger Render Deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: (optional) Install Vercel CLI
        run: |
          # keep this step for caching/global installs if desired, but the deploy step
          # uses npx to ensure the latest CLI without relying on a global install
          npm install -g vercel || true

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Debug network to Vercel
        working-directory: client
        run: |
          echo "== DNS resolution for api.vercel.com =="
          nslookup api.vercel.com || true
          echo "== curl HEAD to api.vercel.com (10s timeout) =="
          curl -I --max-time 10 https://api.vercel.com || true
          echo "== TCP connect to api.vercel.com:443 (using /dev/tcp) =="
          (echo > /dev/tcp/$(getent hosts api.vercel.com | awk '{print $1}' | head -n1)/443) 2>/dev/null || echo "tcp connect failed"

      - name: Deploy to Vercel (with retries + debug)
        working-directory: client
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_DEBUG: '1'
        run: |
          set -euo pipefail
          RETRIES=3
          for i in $(seq 1 $RETRIES); do
            echo "Attempt $i of $RETRIES: deploying to Vercel..."
            if npx --yes vercel@latest --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes; then
              echo "Vercel deploy succeeded on attempt $i"
              exit 0
            else
              echo "Vercel deploy attempt $i failed"
              if [ "$i" -lt "$RETRIES" ]; then
                SLEEP=$((i * 10))
                echo "Sleeping $SLEEP seconds before retrying..."
                sleep $SLEEP
              fi
            fi
          done
          echo "All Vercel deploy attempts failed" >&2
          exit 1
