name: Verify Secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check LLM_API_KEY
        run: |
          if [ -z "${{ secrets.LLM_API_KEY }}" ]; then
            echo "LLM_API_KEY is not set";
            exit 1;
          fi
      - name: Check optional GITHUB_APP keys
        run: |
          echo "GITHUB_APP_ID: ${GITHUB_APP_ID:-(not set)}"
