name: Deploy Agent Runner to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy docker-compose to remote host
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'docker-compose.agent-runner.yml'
          target: ${{ secrets.REMOTE_PATH || '~' }}
      - name: Remote deploy (pull & up)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            REMOTE_PATH=${{ secrets.REMOTE_PATH || '~' }}
            docker compose -f $REMOTE_PATH/docker-compose.agent-runner.yml pull || true
            docker compose -f $REMOTE_PATH/docker-compose.agent-runner.yml up -d
