<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <base href="/">
  <title>Register - Feane</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="css/bootstrap.css" />
  <!-- font awesome style -->
  <link href="css/font-awesome.min.css" rel="stylesheet" />
  <!-- Custom styles for this template -->
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/responsive.css" rel="stylesheet" />

</head>

<body>

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/hero-bg.jpg" alt="">
    </div>

    <!-- header section -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container ">
          <a class="navbar-brand" href="/">
            <span>
              Feane
            </span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
            <span class=""></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav  mx-auto ">
              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/menu.html">Menu</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about.html">About</a>
              </li>
            </ul>
            <div class="user_option">
              <a href="/login.html" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->

    <!-- register section (centered) -->
    <section class="slider_section layout_padding">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg">
              <div class="card-body">
                <h3 class="card-title mb-2">Create account</h3>
                <p class="text-muted">Sign up to get access. It's quick and easy.</p>

                <form id="registerForm" novalidate>
                  <div class="form-row">
                    <div class="form-group col-12">
                      <label for="name">Full name</label>
                      <input id="name" class="form-control" type="text" placeholder="Your full name" required />
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" class="form-control" type="email" placeholder="you@example.com" required />
                  </div>

                  <div class="form-row">
                    <div class="form-group col-6">
                      <label for="password">Password</label>
                      <input id="password" class="form-control" type="password" placeholder="At least 6 characters" required minlength="6" />
                    </div>
                    <div class="form-group col-6">
                      <label for="confirm">Confirm</label>
                      <input id="confirm" class="form-control" type="password" placeholder="Repeat password" required minlength="6" />
                    </div>
                  </div>

                  <div class="d-flex">
                    <button id="submitBtn" type="submit" class="btn btn-primary mr-2">Create account</button>
                    <a href="/login.html" class="btn btn-outline-secondary">Login</a>
                  </div>

                  <div id="msg" class="mt-3 text-danger"></div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- end register section -->

  </div>

  <script>
    (function(){
      const form = document.getElementById('registerForm');
      const msg = document.getElementById('msg');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        msg.textContent = '';
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (!name || !email || !password) {
          msg.textContent = 'Please fill out all fields';
          return;
        }
        if (password.length < 6) {
          msg.textContent = 'Password must be at least 6 characters';
          return;
        }
        if (password !== confirm) {
          msg.textContent = 'Passwords do not match';
          return;
        }

        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Creating...';
        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          if (!res.ok) {
            const j = await res.json().catch(()=>null);
            msg.textContent = j?.message || 'Registration failed';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
          const data = await res.json();
          if (data?.token) {
            try { localStorage.setItem('token', data.token); } catch (err) {}
            msg.classList.remove('text-danger');
            msg.classList.add('text-success');
            msg.textContent = 'Account created — redirecting...';
            setTimeout(()=> window.location.href = '/', 700);
          } else {
            msg.textContent = 'Registration succeeded but no token received';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }
        } catch (err) {
          msg.textContent = 'Network error or server unavailable';
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>

</body>

</html>
