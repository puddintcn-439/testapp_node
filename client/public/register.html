<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <base href="/">
  <title>Register - Feane</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="css/bootstrap.css" />
  <!-- font awesome style -->
  <link href="css/font-awesome.min.css" rel="stylesheet" />
  <!-- Custom styles for this template -->
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/responsive.css" rel="stylesheet" />

  <style>
    .auth-split .auth-left { background: #fbfbfc; }
    .auth-panel { max-width:520px; margin:auto; }
    .auth-right-overlay{ background: rgba(0,0,0,0.25); }
    @media (max-width:767px){ .auth-right{ display:none !important;} }
  </style>

</head>

<body>

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/hero-bg.jpg" alt="">
    </div>
    <!-- header section -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container ">
          <a class="navbar-brand" href="/">
            <span>
              Feane
            </span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
            <span class=""></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav  mx-auto ">
              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/menu.html">Menu</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about.html">About</a>
              </li>
            </ul>
            <div class="user_option">
              <a href="/login.html" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->

    <!-- split auth section -->
    <section class="auth-split">
      <div class="container-fluid">
        <div class="row no-gutters align-items-center min-vh-75">
          <div class="col-md-6 auth-left d-flex align-items-center">
            <div class="auth-panel px-5 py-5 w-100">
              <h2 class="mb-2">Create account</h2>
              <p class="text-muted mb-4">Sign up to get access. It's quick and easy.</p>

              <form id="registerForm" novalidate>
                <div class="form-row">
                  <div class="form-group col-12">
                    <label for="name">Full name</label>
                    <input id="name" class="form-control" type="text" placeholder="Your full name" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" class="form-control" type="email" placeholder="you@example.com" required />
                </div>

                <div class="form-row">
                  <div class="form-group col-6">
                    <label for="password">Password</label>
                    <input id="password" class="form-control" type="password" placeholder="At least 6 characters" required minlength="6" />
                  </div>
                  <div class="form-group col-6">
                    <label for="confirm">Confirm</label>
                    <input id="confirm" class="form-control" type="password" placeholder="Repeat password" required minlength="6" />
                  </div>
                </div>

                <div class="d-flex">
                  <button id="submitBtn" type="submit" class="btn btn-warning btn-block">Create account</button>
                </div>

                <div id="msg" class="mt-3 text-danger"></div>

                <p class="text-center small mt-4 mb-0">Already have an account? <a href="/login.html">Login</a></p>
              </form>
            </div>
          </div>

          <div class="col-md-6 auth-right d-none d-md-block" style="background-image:url('/images/hero-bg.jpg');background-size:cover;background-position:center;min-height:520px;">
            <div class="auth-right-overlay d-flex align-items-center justify-content-center h-100">
              <div class="text-white text-center px-4" style="max-width:320px;">
                <h3 class="mb-3">Join our community</h3>
                <p>Create an account to save orders and preferences.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- end split auth section -->

  </div>

  <!-- jQuery (CDN) -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js" crossorigin="anonymous"></script>
  <!-- popper js -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <!-- bootstrap js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

  <script>
    (function(){
      const form = document.getElementById('registerForm');
      const msg = document.getElementById('msg');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        msg.textContent = '';
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (!name || !email || !password) {
          msg.textContent = 'Please fill out all fields';
          return;
        }
        if (password.length < 6) {
          msg.textContent = 'Password must be at least 6 characters';
          return;
        }
        if (password !== confirm) {
          msg.textContent = 'Passwords do not match';
          return;
        }

        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Creating...';
        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          if (!res.ok) {
            const j = await res.json().catch(()=>null);
            msg.textContent = j?.message || 'Registration failed';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
          const data = await res.json();
          if (data?.token) {
            try { localStorage.setItem('token', data.token); } catch (err) {}
            msg.classList.remove('text-danger');
            msg.classList.add('text-success');
            msg.textContent = 'Account created — redirecting...';
            setTimeout(()=> window.location.href = '/', 700);
          } else {
            msg.textContent = 'Registration succeeded but no token received';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }
        } catch (err) {
          msg.textContent = 'Network error or server unavailable';
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>

</body>

</html>
