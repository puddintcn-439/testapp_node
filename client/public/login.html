<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <base href="/">
  <link rel="shortcut icon" href="images/favicon.png" type="">

  <title> Feane — Login </title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="css/bootstrap.css" />
  <!-- owl slider stylesheet -->
  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
  <!-- nice select  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/css/nice-select.min.css" crossorigin="anonymous" />
  <!-- font awesome style -->
  <link href="css/font-awesome.min.css" rel="stylesheet" />

  <!-- Custom styles for this template -->
  <link href="css/style.css" rel="stylesheet" />
  <!-- responsive style -->
  <link href="css/responsive.css" rel="stylesheet" />

  <style>
    .auth-split .auth-left { background: #fbfbfc; }
    .auth-panel { max-width:520px; margin:auto; }
    .auth-right-overlay{ background: rgba(0,0,0,0.25); }
    @media (max-width:767px){ .auth-right{ display:none !important;} }
    .btn-warning { background:#ef7b2d;border-color:#ef7b2d;color:#fff; }
  </style>
</head>

<body>

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/hero-bg.jpg" alt="">
    </div>

    <!-- header section -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container ">
          <a class="navbar-brand" href="/">
            <span>
              Feane
            </span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
            <span class=""></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav  mx-auto ">
              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/menu.html">Menu</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about.html">About</a>
              </li>
            </ul>
            <div class="user_option">
              <a href="/login.html" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->

    <!-- split auth section -->
    <section class="auth-split">
      <div class="container-fluid">
        <div class="row no-gutters align-items-center min-vh-75">
          <div class="col-md-6 auth-left d-flex align-items-center">
            <div class="auth-panel px-5 py-5 w-100">
              <h2 class="mb-2">Login to Feane</h2>
              <p class="text-muted mb-4">Welcome back — sign in to continue to your account and orders.</p>

              <form id="loginForm" novalidate>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" class="form-control" type="email" placeholder="your-email@gmail.com" required />
                </div>

                <div class="form-group">
                  <label for="password">Password</label>
                  <div class="input-group">
                    <input id="password" class="form-control" type="password" placeholder="Your Password" required minlength="6" />
                    <div class="input-group-append">
                      <button id="togglePwd" class="btn btn-outline-secondary" type="button"><i class="fa fa-eye"></i></button>
                    </div>
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div>
                    <input id="remember" class="form-check-input" type="checkbox" /> <label for="remember" class="small">Remember me</label>
                  </div>
                  <a href="#" class="small">Forgot Password</a>
                </div>

                <div class="d-flex">
                  <button id="submitBtn" type="submit" class="btn btn-warning btn-block">Log In</button>
                </div>

                <div id="msg" class="mt-3 text-danger"></div>
              </form>

              <p class="text-center small mt-4 mb-0">Don't have an account? <a href="/register.html">Create one</a></p>
            </div>
          </div>

          <div class="col-md-6 auth-right d-none d-md-block" style="background-image:url('/images/hero-bg.jpg');background-size:cover;background-position:center;min-height:520px;">
            <div class="auth-right-overlay d-flex align-items-center justify-content-center h-100">
              <div class="text-white text-center px-4" style="max-width:320px;">
                <h3 class="mb-3">Fresh &amp; Tasty</h3>
                <p>Real ingredients, crafted recipes — order online or reserve a table.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- end split auth section -->
  </div>


  <!-- jQuery (CDN) -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js" crossorigin="anonymous"></script>
  <!-- popper js -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <!-- bootstrap js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

  <script>
    (function(){
      const form = document.getElementById('loginForm');
      const msg = document.getElementById('msg');
      const submitBtn = document.getElementById('submitBtn');
      const togglePwd = document.getElementById('togglePwd');
      const pwdInput = document.getElementById('password');

      togglePwd?.addEventListener('click', () => {
        if (!pwdInput) return;
        if (pwdInput.type === 'password') {
          pwdInput.type = 'text';
          togglePwd.innerHTML = '<i class="fa fa-eye-slash"></i>';
        } else {
          pwdInput.type = 'password';
          togglePwd.innerHTML = '<i class="fa fa-eye"></i>';
        }
      });

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        msg.textContent = '';
        const email = document.getElementById('email').value.trim();
        const password = pwdInput.value;

        if (!email || !password) {
          msg.textContent = 'Please enter email and password';
          return;
        }

        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Signing in...';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          if (!res.ok) {
            const j = await res.json().catch(()=>null);
            msg.textContent = j?.message || 'Login failed';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
          const data = await res.json();
          if (data?.token) {
            try { localStorage.setItem('token', data.token); } catch (err) {}
            msg.classList.remove('text-danger');
            msg.classList.add('text-success');
            msg.textContent = 'Login successful — redirecting...';
            setTimeout(()=> window.location.href = '/', 700);
          } else {
            msg.textContent = 'Login succeeded but no token received';
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }
        } catch (err) {
          msg.textContent = 'Network error or server unavailable';
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>

</body>

</html>
